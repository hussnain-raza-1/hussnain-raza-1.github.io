<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hussnain Raza — Designer</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Open+Sans:wght@600;700;800&display=swap" rel="stylesheet">

<style>
:root{
--white:#f8f8f6;
--black:#0d0d0d;
--mid:#777;
--accent:#c8b89a;

--font-display:'Open Sans',sans-serif;
--font-body:'Montserrat',sans-serif;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:var(--font-body);
background:var(--white);
color:var(--black);
cursor:none;
}

/* LOADER */
#loader{
position:fixed;inset:0;
background:var(--black);
display:flex;align-items:center;justify-content:center;
z-index:9999;
}
.loader-ring{
width:80px;height:80px;
border:1px solid #fff;
border-radius:50%;
display:flex;align-items:center;justify-content:center;
animation:spin 1.5s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* CURSOR */
#cursor{
position:fixed;
width:12px;height:12px;
background:var(--black);
pointer-events:none;
z-index:999;
transform:translate(-50%,-50%);
}

/* cursor states */
body.cursor-square #cursor{border-radius:0;}
body.cursor-circle #cursor{border-radius:50%;}
body.cursor-cross #cursor{
background:transparent;
}
body.cursor-cross #cursor::before,
body.cursor-cross #cursor::after{
content:'';
position:absolute;
width:20px;height:2px;
background:var(--black);
top:50%;left:50%;
transform-origin:center;
}
body.cursor-cross #cursor::before{
transform:translate(-50%,-50%) rotate(45deg);
}
body.cursor-cross #cursor::after{
transform:translate(-50%,-50%) rotate(-45deg);
}

/* NAV */
nav{
position:fixed;
top:0;width:100%;
display:flex;
justify-content:center;
padding:30px;
z-index:100;
}
.nav-logo{
position:absolute;
left:40px;
}
.nav-links{
display:flex;
gap:40px;
list-style:none;
}
.nav-links a{
text-decoration:none;
font-size:12px;
letter-spacing:2px;
color:var(--black);
}

/* SCROLL LINE */
.nav-line{
position:fixed;
top:70px;
left:0;
height:1px;
background:var(--black);
width:0%;
z-index:99;
}

/* HERO */
#hero{
height:100vh;
display:flex;
align-items:flex-end;
padding:60px;
position:relative;
}
.hero-symbol{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%);
font-size:200px;
opacity:0.05;
}
.hero-name{
font-family:var(--font-display);
font-size:80px;
font-weight:700;
}

/* SECTIONS */
section{padding:120px 60px;}

#work{background:var(--black);color:var(--white);}
#contact{background:var(--black);color:var(--white);}

/* PROJECT LIST */
.project{
padding:30px 0;
border-top:1px solid rgba(255,255,255,0.2);
font-size:32px;
}

/* CONTACT */
.contact-title{
font-size:80px;
font-family:var(--font-display);
}

/* RESPONSIVE */
@media(max-width:768px){
.hero-name{font-size:48px;}
.contact-title{font-size:48px;}
}

</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
<div class="loader-ring">
<svg width="30" height="30" viewBox="0 0 24 24" stroke="white" fill="none">
<path d="M6 14c0-4 2.5-7 6-7s6 3 6 7"/>
</svg>
</div>
</div>

<!-- CURSOR -->
<div id="cursor"></div>

<!-- NAV -->
<nav>
<div class="nav-logo">
<svg width="24" height="24" viewBox="0 0 24 24" stroke="black" fill="none">
<path d="M6 14c0-4 2.5-7 6-7s6 3 6 7"/>
</svg>
</div>

<ul class="nav-links">
<li><a href="#about">About</a></li>
<li><a href="#work">Work</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
</nav>

<div class="nav-line"></div>

<!-- HERO -->
<section id="hero" data-cursor="circle">
<div class="hero-symbol">♈</div>
<h1 class="hero-name">Hussnain Raza</h1>
</section>

<!-- ABOUT -->
<section id="about" data-cursor="square">
<h2>About</h2>
<p style="max-width:500px;margin-top:20px;color:var(--mid);">
I design clean, intentional brand identities that focus on clarity and impact.
</p>
</section>

<!-- WORK -->
<section id="work" data-cursor="cross">
<h2>Work</h2>

<div class="project">Brand Identity — 2025</div>
<div class="project">Logo System — 2025</div>
<div class="project">Visual Identity — 2024</div>

</section>

<!-- CONTACT -->
<section id="contact" data-cursor="circle">
<h2 class="contact-title">Let’s build something</h2>
<p style="margin-top:20px;">hussnain@email.com</p>
</section>

<script>

/* loader */
window.onload=()=>{
setTimeout(()=>{
document.getElementById('loader').style.display='none';
},800);
}

/* cursor */
const cursor=document.getElementById('cursor');
document.addEventListener('mousemove',e=>{
cursor.style.left=e.clientX+'px';
cursor.style.top=e.clientY+'px';
});

/* cursor section change */
const sections=document.querySelectorAll('section');

window.addEventListener('scroll',()=>{
let current='';
sections.forEach(sec=>{
const top=window.scrollY;
if(top>=sec.offsetTop-200){
current=sec.dataset.cursor;
}
});
document.body.className='';
document.body.classList.add('cursor-'+current);
});

/* scroll line */
window.addEventListener('scroll',()=>{
let h=document.body.scrollHeight-window.innerHeight;
let p=(window.scrollY/h)*100;
document.querySelector('.nav-line').style.width=p+'%';
});

</script>

</body>
</html>
